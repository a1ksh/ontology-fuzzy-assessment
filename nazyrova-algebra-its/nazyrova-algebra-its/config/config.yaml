# Reproducibility configuration. Values marked FILL must match the manuscript.
seed: 42
membership:
  x_low: 0.5          # eq. 6 lower threshold
  x_high: 0.90        # full-mastery threshold (Section 4.3 default)
weights:
  w_C: 0.6            # declarative (concepts)
  w_E: 0.4            # structural (links)
diagnosis:
  tau: 0.5            # diagnostic threshold (eq. 14)
levels:               # lambda_l, Table 3 (must sum to 1)
  l0: 0.00
  l1: 0.20
  l2: 0.30
  l3: 0.50
baselines:
  binary_final_score:
    threshold: 0.60
  bkt:                # FILL with your fitted/settings values
    fit: EM           # EM | fixed
    p_init: null
    p_learn: null
    p_slip: null
    p_guess: null
    gap_tau: 0.5      # p(L) < tau -> concept gap
split:
  scheme: stratified_kfold
  k: 5                # FILL if different
  by: learner_id      # no learner in both train and test
sensitivity:
  full_mastery_thresholds: [0.85, 0.90, 0.95]   # Figure 6
stats:
  kappa_ci: bootstrap
  n_boot: 10000
  rmse_test: wilcoxon_signed_rank
  multiple_comparison: holm_bonferroni
